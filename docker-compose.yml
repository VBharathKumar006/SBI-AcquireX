services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "4000:4000"
    env_file: ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/sbi-acquirex
      - NODE_ENV=production
      - CORS_ORIGINS=http://localhost:3000
      - RATE_LIMIT_MAX=200
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
